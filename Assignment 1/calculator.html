<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>

<div class="container">

    <h1>🎓 Student Result Calculator</h1>

    <label>Student Name</label>
    <input type="text" id="studentName" placeholder="Enter Student Name">

    <label>Subject 1 Marks</label>
    <input type="number" id="sub1">

    <label>Subject 2 Marks</label>
    <input type="number" id="sub2">

    <label>Subject 3 Marks</label>
    <input type="number" id="sub3">

    <label>Subject 4 Marks</label>
    <input type="number" id="sub4">

    <label>Subject 5 Marks</label>
    <input type="number" id="sub5">

    <label>Select Day</label>

    <select id="day">
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
    </select>

    <button onclick="calculateResult()">
        Calculate Result
    </button>

    <div id="result"></div>

</div>

<script src="calculator.js"></script>

</body>
</html>
